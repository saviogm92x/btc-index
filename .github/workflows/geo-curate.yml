# .github/workflows/geo-curate.yml
# Curates the dashboard's geopolitical & macro overlay with Claude.
# Runs every 6 hours (+ manual "Run workflow" button), writes geo.json to the
# repo root, and commits it — which automatically re-deploys GitHub Pages.
# The API key lives ONLY in the repo secret ANTHROPIC_API_KEY, never in code.

name: Curate geo overlay

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6h at :17 (off-peak minute — on-the-hour crons get delayed)
  workflow_dispatch:          # manual trigger from the Actions tab

permissions:
  contents: write             # allows the job to commit geo.json back

concurrency:
  group: geo-curate
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch headlines and curate with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node geo-feed.js

      - name: Commit geo.json if it changed
        run: |
          git config user.name "geo-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geo.json
          git diff --staged --quiet && echo "No change in overlay — nothing to commit." || {
            git commit -m "geo: refresh curated overlay"
            git push
          }
